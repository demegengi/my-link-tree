<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Links</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0d0d0d;
      color: #ffffff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      text-align: center;
      background: #111;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 0 20px rgba(255,255,255,0.05);
      width: 300px;
    }

    h1 {
      margin-bottom: 30px;
      letter-spacing: 1px;
    }

    a {
      display: block;
      text-decoration: none;
      color: white;
      background: #1a1a1a;
      padding: 15px;
      margin: 12px 0;
      border-radius: 12px;
      border: 1px solid #333;
      transition: 0.3s;
      font-weight: bold;
    }

    a:hover {
      background: #222;
      border-color: #666;
      transform: scale(1.05);
    }
  </style>
</head>
<body>

<div class="container">
  <h1>My Links</h1>

  <a href="https://github.com/demegengi" target="_blank">GitHub</a>
  <a href="#" target="_blank">Facebook</a>

</div>

</body>
</html>
